name: bacen
version: "1.0.0"
config-version: 2

profile: bacen

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Materializacao e schema por camada (a macro generate_schema_name evita o prefixo
# padrao do dbt, deixando os schemas limpos: staging, intermediate, marts).
models:
  bacen:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  bacen:
    +schema: marts
    dim_indicadores:
      +column_types:
        codigo_sgs: integer
