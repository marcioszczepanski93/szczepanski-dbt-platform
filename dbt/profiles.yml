# Perfil de conexao do dbt com o Postgres warehouse.
# Sem segredos em texto: todas as credenciais vem de variaveis de ambiente
# (as mesmas WAREHOUSE_* do .env, ja presentes no container do Airflow). Por isso
# este arquivo pode ser versionado com seguranca.
bacen:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('WAREHOUSE_HOST') }}"
      port: "{{ env_var('WAREHOUSE_PORT') | int }}"
      user: "{{ env_var('WAREHOUSE_USER') }}"
      password: "{{ env_var('WAREHOUSE_PASSWORD') }}"
      dbname: "{{ env_var('WAREHOUSE_DB') }}"
      schema: public
      threads: 4
