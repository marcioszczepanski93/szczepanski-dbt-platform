# Airflow 3.x — LocalExecutor (volume de tasks baixo, sem Celery/Redis).
# Componentes da 3.x: api-server (substitui o webserver), scheduler,
# dag-processor (standalone) e triggerer. UI em http://localhost:8080 (admin/admin).
#
# Dois Postgres separados de proposito:
#   - postgres-airflow: metadata do Airflow
#   - postgres-warehouse: warehouse analytics (schemas raw/staging/intermediate/marts),
#     destino da ingestao e do dbt, e fonte do Metabase.
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
    args:
      AIRFLOW_VERSION: ${AIRFLOW_VERSION:-3.0.3}
  # Roda como o UID do host (injetado por `make up`) com grupo 0, para que os arquivos
  # escritos nos volumes montados (logs/, dbt/target) pertencam ao usuario e sejam
  # graváveis. Default 50000 (usuario airflow da imagem) se AIRFLOW_UID nao vier.
  user: "${AIRFLOW_UID:-50000}:0"
  env_file: .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-troque-em-producao}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./include:/opt/airflow/include
    - ./src:/opt/airflow/src
    - ./dbt:/opt/airflow/dbt
    - ./logs:/opt/airflow/logs
    - ./tests:/opt/airflow/tests
    - ./pyproject.toml:/opt/airflow/pyproject.toml
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  postgres-warehouse:
    image: postgres:15
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER:-bacen}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD:-changeme}
      POSTGRES_DB: ${WAREHOUSE_DB:-bacen_analytics}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - warehouse-db:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${WAREHOUSE_USER:-bacen}"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Marcio --lastname Szczepanski \
          --role Admin --email "${ALERT_EMAIL_TO:-admin@example.com}" || true
    restart: on-failure

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Metabase usa H2 embarcado (persistido no volume) — zero config para uso local.
  # O banco analitico que ele consulta e o postgres-warehouse, conectado pela UI.
  metabase:
    image: metabase/metabase:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      postgres-warehouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  airflow-db:
  warehouse-db:
  metabase-data:
